<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">Liminal Flow</title>
  <desc id="hero-desc">Terminal-native working memory for developers. A dark-themed banner with flowing thread visualisation.</desc>

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050507"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>

    <!-- Brand gradient: orange to pink to purple -->
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffaa40"/>
      <stop offset="50%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Flow beam: cyan -->
    <linearGradient id="flow-beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5aa2ff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#5aa2ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#5aa2ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Active beam: green -->
    <linearGradient id="active-beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ec66a" stop-opacity="0"/>
      <stop offset="40%" stop-color="#2ec66a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2ec66a" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle text glow -->
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" rx="18" fill="url(#bg)"/>

  <!-- Ambient glow circles -->
  <g opacity="0.08">
    <circle cx="200" cy="280" r="180" fill="#a78bfa"/>
    <circle cx="1000" cy="60" r="150" fill="#ffaa40"/>
    <circle cx="600" cy="160" r="200" fill="#5aa2ff"/>
  </g>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#5aa2ff" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="900" y1="0" x2="900" y2="320"/>
  </g>

  <!-- Flow paths: threads flowing left to right -->
  <path id="flow-main" d="M80 160 C300 160, 400 140, 600 140 S900 160, 1120 155" stroke="url(#flow-beam)" stroke-width="3" fill="none" opacity="0.4"/>
  <path id="flow-branch" d="M600 140 C700 140, 740 190, 850 195 S1000 180, 1120 185" stroke="url(#active-beam)" stroke-width="2" fill="none" opacity="0.3"/>
  <path id="flow-return" d="M850 195 C900 195, 920 160, 950 155" stroke="url(#flow-beam)" stroke-width="1.5" fill="none" opacity="0.2" stroke-dasharray="4 6"/>

  <!-- Animated flow particles -->
  <g>
    <circle r="4" fill="#5aa2ff" opacity="0.8">
      <animateMotion dur="6s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
        <mpath href="#flow-main"/>
      </animateMotion>
    </circle>
  </g>
  <g>
    <circle r="3" fill="#2ec66a" opacity="0.7">
      <animateMotion dur="4.5s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
        <mpath href="#flow-branch"/>
      </animateMotion>
    </circle>
  </g>
  <g>
    <circle r="2.5" fill="#5aa2ff" opacity="0.5">
      <animateMotion dur="3s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
        <mpath href="#flow-return"/>
      </animateMotion>
    </circle>
  </g>

  <!-- Thread node markers along the flow -->
  <g filter="url(#glow)">
    <!-- /now node -->
    <circle cx="160" cy="157" r="6" fill="#ffaa40" opacity="0.9"/>
    <text x="140" y="140" fill="#ffaa40" font-size="11" font-family="monospace" opacity="0.6">/now</text>

    <!-- Active thread node -->
    <circle cx="600" cy="140" r="8" fill="#2ec66a" opacity="0.9"/>

    <!-- /branch node -->
    <circle cx="750" cy="175" r="5" fill="#5aa2ff" opacity="0.8"/>
    <text x="730" y="215" fill="#5aa2ff" font-size="11" font-family="monospace" opacity="0.6">/branch</text>

    <!-- /back node -->
    <circle cx="950" cy="155" r="5" fill="#a78bfa" opacity="0.7"/>
    <text x="935" y="140" fill="#a78bfa" font-size="11" font-family="monospace" opacity="0.6">/back</text>

    <!-- /done node -->
    <circle cx="1100" cy="156" r="6" fill="#ffaa40" opacity="0.6"/>
    <text x="1080" y="140" fill="#ffaa40" font-size="11" font-family="monospace" opacity="0.5">/done</text>
  </g>

  <!-- Title -->
  <text x="80" y="68" font-size="42" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-weight="700" letter-spacing="-0.02em" fill="url(#brand)" filter="url(#text-glow)">Liminal Flow</text>

  <!-- Tagline -->
  <text x="82" y="96" fill="#b4bfce" font-size="16" font-family="'Inter', system-ui, sans-serif">Terminal-native working memory for developers</text>

  <!-- flo prompt badge -->
  <g transform="translate(980, 42)">
    <rect width="140" height="38" rx="10" fill="#0f1520" stroke="#2e3540" stroke-width="1"/>
    <text x="16" y="25" font-size="18" font-family="monospace">
      <tspan fill="#7c8796">&gt; </tspan><tspan fill="#5aa2ff" font-weight="700">flo</tspan><tspan fill="#2ec66a"> _</tspan>
    </text>
  </g>

  <!-- Bottom info line -->
  <text x="80" y="290" fill="#7c8796" font-size="13" font-family="monospace">
    <tspan fill="#9aa4b2">threads</tspan>
    <tspan fill="#2e3540"> | </tspan>
    <tspan fill="#9aa4b2">branches</tspan>
    <tspan fill="#2e3540"> | </tspan>
    <tspan fill="#9aa4b2">scopes</tspan>
    <tspan fill="#2e3540"> | </tspan>
    <tspan fill="#9aa4b2">events</tspan>
    <tspan fill="#2e3540">  &#x2022;  </tspan>
    <tspan fill="#7c8796">Liminal HQ</tspan>
  </text>
</svg>
